<nav class="hotel-nav">
  <div class="nav-inner">

    <!-- Brand -->
    <a class="nav-brand" routerLink="/dashboard">
      <span class="brand-icon">🏨</span>
      <div class="brand-text">
        <span class="brand-name">Grand Résidence</span>
        <span class="brand-sub">Panel Administrativo</span>
      </div>
    </a>

    <!-- Toggler móvil -->
    <button class="nav-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="nav-links">
        <li>
          <a class="nav-link" routerLink="/dashboard/huespedes" routerLinkActive="active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Huéspedes
          </a>
        </li>
        <li>
          <a class="nav-link" routerLink="/dashboard/habitaciones" routerLinkActive="active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Habitaciones
          </a>
        </li>
        <li>
          <a class="nav-link" routerLink="/dashboard/reservaciones" routerLinkActive="active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Reservaciones
          </a>
        </li>
        <li *ngIf="showMenuAdmin">
          <a class="nav-link" routerLink="/dashboard/usuarios" routerLinkActive="active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
            </svg>
            Usuarios
          </a>
        </li>
      </ul>
    </div>

    <!-- Usuario + logout -->
    <div class="nav-user">
      <div class="user-chip" *ngIf="username">
        <div class="user-avatar">{{ username.charAt(0).toUpperCase() }}</div>
        <span class="user-name">{{ username }}</span>
      </div>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Salir</span>
      </button>
    </div>

  </div>
