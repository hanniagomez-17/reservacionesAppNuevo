<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<div class="login-wrapper">

  <!-- Panel izquierdo: imagen/branding -->
  <div class="login-branding">
    <div class="branding-overlay"></div>
    <div class="branding-content">
      <div class="hotel-icon">🏨</div>
      <h1 class="hotel-name">Grand Résidence</h1>
      <p class="hotel-tagline">Sistema de Gestión Hotelera</p>
      <div class="divider-line"></div>
      <p class="hotel-sub">Bienvenido al portal administrativo</p>
    </div>
    <div class="branding-footer">
      <span>Reservaciones · Huéspedes · Habitaciones</span>
    </div>
  </div>

  <!-- Panel derecho: formulario -->
  <div class="login-form-panel">
    <form (ngSubmit)="onLogin()" class="login-form">

      <div class="form-header">
        <div class="form-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h2 class="form-title">Iniciar Sesión</h2>
        <p class="form-subtitle">Accede al panel de administración</p>
      </div>

      <div class="field-group">
        <label for="username" class="field-label">Usuario</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input [(ngModel)]="username" name="username" id="username"
                 type="text" class="field-input" placeholder="Ingresa tu usuario" required autocomplete="username"/>
        </div>
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [(ngModel)]="password" name="password" id="password"
                 type="password" class="field-input" placeholder="Ingresa tu contraseña" required autocomplete="current-password"/>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <span>Ingresar al Sistema</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <p *ngIf="error" class="error-msg">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </p>

    </form>
  </div>

</div>
