<div class="app-container">
  <app-navbar></app-navbar>

  <main>
    <router-outlet>

      <!-- Contenido home visible solo cuando no hay ruta hija activa -->
      <div class="dashboard-home">

        <!-- Hero con carrusel -->
        <section class="hero-carousel">
          <div class="carousel-track" [style.transform]="'translateX(-' + (currentSlide * 100) + '%)'">
            <div class="carousel-slide" *ngFor="let slide of slides" [style.background-image]="'url(' + slide.img + ')'">
              <div class="slide-overlay"></div>
              <div class="slide-content">
                <span class="slide-tag">{{ slide.tag }}</span>
                <h2 class="slide-title">{{ slide.title }}</h2>
                <p class="slide-desc">{{ slide.desc }}</p>
              </div>
            </div>
          </div>

          <!-- Controles -->
          <button class="carousel-btn prev" (click)="prevSlide()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="carousel-btn next" (click)="nextSlide()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>

          <!-- Dots -->
          <div class="carousel-dots">
            <button *ngFor="let s of slides; let i = index"
                    class="dot" [class.active]="i === currentSlide"
                    (click)="goToSlide(i)">
            </button>
          </div>
        </section>

        <!-- Tarjetas de módulos -->
        <section class="modules-section">
          <div class="section-header">
            <div class="section-line"></div>
            <h3 class="section-title">Módulos del Sistema</h3>
            <div class="section-line"></div>
          </div>

          <div class="modules-grid">
            <a class="module-card" routerLink="/dashboard/huespedes">
              <div class="module-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
              </div>
              <div class="module-info">
                <h4>Huéspedes</h4>
                <p>Gestión de clientes y perfiles</p>
              </div>
              <svg class="module-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>

            <a class="module-card" routerLink="/dashboard/habitaciones">
              <div class="module-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
              </div>
              <div class="module-info">
                <h4>Habitaciones</h4>
                <p>Disponibilidad y categorías</p>
              </div>
              <svg class="module-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>

            <a class="module-card" routerLink="/dashboard/reservaciones">
              <div class="module-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </div>
              <div class="module-info">
                <h4>Reservaciones</h4>
                <p>Control de estadías y fechas</p>
              </div>
              <svg class="module-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>

            <a class="module-card" routerLink="/dashboard/usuarios">
              <div class="module-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="8" r="4"/>
                  <path d="M20 21a8 8 0 1 0-16 0"/>
                </svg>
              </div>
              <div class="module-info">
                <h4>Usuarios</h4>
                <p>Administración de accesos</p>
              </div>
              <svg class="module-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </section>

        <!-- Stats decorativas -->
        <section class="stats-section">
          <div class="stat-item" *ngFor="let stat of stats">
            <span class="stat-number">{{ stat.value }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
        </section>

      </div>
    </router-outlet>
  </main>

  <app-footer></app-footer>
</div>
